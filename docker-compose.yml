services:

  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_DB: payrollservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data


  cofig-server:
    image: cofig-server
    container_name: cofig-server
    ports:
      - "8888:8888"


  eureka-server:
    image: eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      - cofig-server


  employee-service:
    image: employee-service
    container_name: employee-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - cofig-server
      - eureka-server


  attendance-service:
    image: attendance-service
    container_name: attendance-service
    ports:
      - "8082:8082"
    depends_on:
      - employee-service
      - cofig-server
      - eureka-server


  leave-service:
    image: leave-service
    container_name: leave-service
    ports:
      - "8084:8084"
    depends_on:
      - employee-service
      - cofig-server
      - eureka-server


  payroll-service:
    image: payroll-service
    container_name: payroll-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - employee-service
      - cofig-server
      - eureka-server


  api-gateway:
    image: api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - employee-service
      - attendance-service
      - leave-service
      - payroll-service
      - eureka-server


  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1


volumes:
  postgres-data: