services:

  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_DB: payrollservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  config-server:
    image: cofig-server
    container_name: config-server
    ports:
      - "8888:8888"

  eureka-server:
    image: eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      - config-server

  payroll-service:
    image: payroll-service
    container_name: payroll-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - config-server
      - eureka-server

volumes:
  postgres-data: