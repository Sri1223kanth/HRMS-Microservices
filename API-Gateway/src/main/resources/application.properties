# Application
#################################################

spring.application.name=API-GATEWAY
server.port=8080

#################################################
# Config Server
#################################################

spring.config.import=optional:configserver:http://localhost:8888

#################################################
# Eureka
#################################################

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

#################################################
# Spring Cloud Gateway
#################################################

spring.cloud.gateway.server.webflux.routes[0].id=true
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true

#################################################
# Employee Service
#################################################

spring.cloud.gateway.routes[0].id=employee-service
spring.cloud.gateway.routes[0].uri=lb://EMPLOYEE-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/employees/**

#################################################
# Attendance Service
#################################################

spring.cloud.gateway.routes[1].id=attendance-service
spring.cloud.gateway.routes[1].uri=lb://ATTENDANCE-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/attendance/**

#################################################
# Payroll Service
#################################################

spring.cloud.gateway.routes[2].id=payroll-service
spring.cloud.gateway.routes[2].uri=lb://PAYROLL-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/payroll/**

#################################################
# Leave Service
#################################################

spring.cloud.gateway.routes[3].id=leave-service
spring.cloud.gateway.routes[3].uri=lb://LEAVE-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/leave/**

#################################################
# Auth Service
#################################################

spring.cloud.gateway.routes[4].id=auth-service
spring.cloud.gateway.routes[4].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/auth/**

#################################################
# Actuator
#################################################

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always